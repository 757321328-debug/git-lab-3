    <h2>CAMT - 清迈大学艺术、媒体与技术学院</h2>
    <p>CAMT（College of Arts, Media and Technology）隶属于泰国清迈大学（Chiang Mai University），专注于艺术、媒体、数字技术与创意设计领域的教学与研究。</p>
    <p>学院注重理论与实践结合，培养数字媒体、软件开发、交互设计等方向的复合型人才，与多国高校有学术合作交流。</p>
